<!DOCTYPE html>


<html lang = "en">

<head>
    <meta charset = "UTF-8">
    <title>Login - Tower Lease Portal</title>
    <link rel = "stylesheet" href = "/genesisportal/CSS/style.css">
</head>

<body>
    <div class = "login-box">
    
        <h1> Sign In</h1>
        <p>  Enter your details to access your account.</p>

        <form action = "/genesisportal/LoginServlet" method="post">
           
            <label for = "username">Username</label>
            <input type = "text" id = "username" name = "username" required>

            <label for = "password">Password</label>
            <input type = "password" id = "password" name = "password" required>

            <button type = "submit">Log In</button>

			<p class="signup-prompt">
            Don't have an account? <a href="HTML/register.html">Create one</a>
            </p>
		
        </form>

		<p class="signup-prompt">
            <a href="HTML/GenesisLandingPage/genesisLandingPage.html">press me</a>
            </p>
			

			
<!-- Submit button packages up all the infromation in the form, and performs the action-->

    </div>
</body>

</html>
