<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Lease Agreement</title>
  <link rel="stylesheet" href="/genesisportal/CSS/crud.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="genesis.html" aria-label="Tower Lease Manager home">
      <span class="brand-icon" aria-hidden="true"></span>
      <span>Tower Lease Manager</span>
    </a>
    <a class="back-link" href="genesis.html">Back to Home</a>
  </header>

  <main class="form-page">
    <section class="form-card">
      <div class="form-heading">
        <p>View</p>
        <h1>View Lease Agreement</h1>
        <span>Look up an existing tower lease agreement.</span>
      </div>

      <form action="ViewAgreementServlet" method="get">
        <input type="hidden" name="operation" value="view">

        <div class="form-grid one-column">
          <label>
            Agreement ID
            <input type="text" name="agreement_id" placeholder="Enter agreement ID" required>
          </label>

          <label>
            Site ID
            <input type="text" name="site_id" placeholder="Optional site ID">
          </label>

          <label>
            Tower Name
            <input type="text" name="tower_name" placeholder="Optional tower name">
          </label>
        </div>

        <button class="submit-button" type="submit">View Lease</button>
      </form>
    </section>
  </main>
</body>
</html>
