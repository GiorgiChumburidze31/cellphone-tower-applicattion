<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Lease Agreement</title>
  <link rel="stylesheet" href="/genesisportal/CSS/crud.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="genesis.html" aria-label="Tower Lease Manager home">
      <span class="brand-icon" aria-hidden="true"></span>
      <span>Tower Lease Manager</span>
    </a>
    <a class="back-link" href="genesis.html">Back to Home</a>
  </header>

  <main class="form-page">
    <section class="form-card danger-form">
      <div class="form-heading">
        <p>Delete</p>
        <h1>Delete Lease Agreement</h1>
        <span>Remove a tower lease agreement record.</span>
      </div>

      <form action="DeleteAgreementServlet" method="post">
        <input type="hidden" name="operation" value="delete">
        <input type="hidden" name="_method" value="delete">

        <div class="form-grid one-column">
          <label>
            Agreement ID
            <input type="text" name="agreement_id" placeholder="Enter agreement ID" required>
          </label>

          <label>
            Site ID
            <input type="text" name="site_id" placeholder="Optional site ID">
          </label>

          <label>
            Delete Reason
            <textarea name="delete_reason" rows="4" placeholder="Optional reason for deleting this lease"></textarea>
          </label>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" name="confirm_delete" value="yes" required>
          I confirm this lease agreement should be deleted.
        </label>

        <button class="submit-button danger-button" type="submit">Delete Lease</button>
      </form>
    </section>
  </main>
</body>
</html>
